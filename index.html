<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:#fdf6ee;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:9000;
  display:flex;justify-content:center;flex-wrap:wrap;gap:0.5rem 2rem;
  padding:0.85rem 2rem;
  background:rgba(253,246,238,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(180,100,60,0.12);
}
nav a{color:#b07850;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:color 0.3s;white-space:nowrap;}
nav a:hover,nav a.active{color:#c45030;}
nav a.active{border-bottom:1.5px solid #c45030;padding-bottom:2px;}

/* HERO — full viewport, truly centered */
.hero{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 2rem;
  background:linear-gradient(155deg,#fff8f0 0%,#fde8d4 55%,#faeadc 100%);
  position:relative;
  overflow:hidden;
}
.blob{
  position:absolute;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;
}
.b1{width:600px;height:600px;top:-150px;right:-150px;background:rgba(220,110,60,0.09);}
.b2{width:500px;height:500px;bottom:-150px;left:-150px;background:rgba(200,80,60,0.07);}
.hero-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;
}
.hero-photo{
  width:clamp(160px,20vw,280px);
  height:clamp(160px,20vw,280px);
  border-radius:50%;
  object-fit:cover;
  object-position:center top;
  border:3px solid rgba(196,120,70,0.4);
  margin-bottom:1.8rem;
  box-shadow:0 16px 60px rgba(180,80,40,0.22);
  display:block;
}
.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,7vw,7rem);
  font-weight:600;color:#1a0a04;
  line-height:1.0;margin-bottom:0.4rem;
}
.hero h1 em{font-style:italic;color:#c45030;}
.hero-sub{
  font-size:clamp(0.72rem,1.2vw,0.88rem);
  color:#a07858;letter-spacing:2px;
  margin-bottom:1.8rem;font-weight:300;
  text-transform:uppercase;
}
.badge{
  display:inline-block;
  border:1.5px solid rgba(196,80,48,0.3);
  border-radius:999px;padding:0.38rem 1.3rem;
  font-size:clamp(0.6rem,1vw,0.7rem);letter-spacing:2px;
  color:#c45030;text-transform:uppercase;
  background:rgba(196,80,48,0.06);
  margin-bottom:2rem;
}
.cta{
  display:inline-block;background:#c45030;color:#fff;
  padding:0.88rem 2.4rem;border-radius:999px;
  font-size:clamp(0.75rem,1.2vw,0.85rem);
  letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;font-weight:500;
  box-shadow:0 8px 28px rgba(196,80,48,0.32);
  transition:transform 0.2s,box-shadow 0.2s;
}
.cta:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(196,80,48,0.38);}
.cta:active{transform:scale(0.97);}

@media(max-width:600px){
  nav{gap:0.5rem 1.2rem;padding:0.75rem 1rem;}
  nav a{font-size:0.62rem;letter-spacing:1.2px;}
}
</style>

  <span class="fo-emoji">🥺</span>
  <h1 class="fo-title">Please forgive me,<br><em>Maalkin</em></h1>
  <p class="fo-sub">i made this whole thing just for you. will you forgive me?</p>
  <div class="fo-btns">
    <button class="btn-yes" onclick="forgiven()">yes, you're forgiven 💌</button>
    <button class="btn-no" id="btn-no" onclick="notYet()">not yet...</button>
    <p class="fo-extra" id="fo-extra"></p>
  </div>
</div>

<script>
const noPhrases = [
  { btn: "fine but you owe me 😤", extra: "ok fair enough, i owe you everything." },
  { btn: "pleaseee Maalkin 🥺", extra: "i'm literally begging you right now." },
  { btn: "i'll cry i swear 😭", extra: "don't do this to me. please." },
  { btn: "MAALKIN PLEASE 😭😭", extra: "ok i am actually crying." },
  { btn: "i made you a whole website 🥺", extra: "43 photos. 2 videos. a whole letter. please." },
  { btn: "your biggest HATER is begging 😭", extra: "this is humiliating. please forgive me." },
  { btn: "pleaseeeeeee 🥹", extra: "i will not stop asking." },
  { btn: "i love you so much please 💔", extra: "you are my Supreme Leader. have mercy." },
  { btn: "ok i give up 😔", extra: "...but i still love you. forever." },
  { btn: "just say yes Maalkin 😭🥺", extra: "we both know you already forgave me. just say it." },
  { btn: "PLEASE 🥺🥺🥺", extra: "i will ask until you say yes. i have infinite time." },
  { btn: "you're smiling aren't you 😏", extra: "i knew it. just say yes." },
  { btn: "ok fine i'll be sad forever then 😔", extra: "...no i won't. because you'll say yes. i know you." },
  { btn: "Maalkin jaani please 🥺", extra: "hayati. qalbi. roohi. please." },
  { btn: "i'm not stopping 🥺", extra: "i told you. i never stop." },
];

let count = 0;

function notYet() {
  const btn = document.getElementById('btn-no');
  const extra = document.getElementById('fo-extra');
  const phrase = noPhrases[count % noPhrases.length];
  btn.textContent = phrase.btn;
  extra.textContent = phrase.extra;
  count++;
  const yesBtn = document.querySelector('.btn-yes');
  yesBtn.style.transform = 'scale(1.05)';
  setTimeout(() => yesBtn.style.transform = '', 300);
}

function forgiven() {
  const overlay = document.getElementById('forgive-overlay');
  overlay.classList.add('fade-out');
  setTimeout(() => overlay.remove(), 650);
}
</script>
